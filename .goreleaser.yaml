version: 2

project_name: assh

before:
  hooks:
    - go mod tidy

builds:
  - id: assh
    main: ./cmd/assh
    binary: assh
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/agent-ssh/assh/internal/cli.version={{.Version}}
      - -X github.com/agent-ssh/assh/internal/cli.commit={{.Commit}}
      - -X github.com/agent-ssh/assh/internal/cli.date={{.Date}}

archives:
  - id: default
    ids:
      - assh
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        formats: ["zip"]

checksum:
  name_template: checksums.txt

release:
  github:
    owner: agent-ssh
    name: assh

snapshot:
  version_template: "{{ .Version }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
