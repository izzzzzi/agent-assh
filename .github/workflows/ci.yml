name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22"

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  race:
    name: Race
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22"

      - name: Race test
        run: go test -race ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22"

      - name: Go lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          config: .markdownlint-cli2.yaml
          globs: |
            README.md
            README.en.md
            AGENT_INSTRUCTIONS.md
            SYSTEM_PROMPT_snippet.md

  release-check:
    name: Release Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Check GoReleaser config
        uses: goreleaser/goreleaser-action@v7
        with:
          args: check

      - name: Check release artifact contract
        run: npm run release:contract

  npm-smoke:
    name: npm Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Smoke test
        run: npm run smoke

      - name: Dry-run pack
        run: npm pack --dry-run
